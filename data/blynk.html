<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARISE IoT | Blynk Setup</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root {
      --bg: #030508;
      --panel: #080d18;
      --panel-border: #152040;
      --text: #e8ecf4;
      --muted: #8896b3;
      --brand: #ff525f;
      --blynk: #22c55e;
      --field: #0e1525;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Manrope', sans-serif; }
    body { 
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
      background: radial-gradient(circle at 15% 8%, #0a2818 0, var(--bg) 60%); color: var(--text);
    }
    .card { 
      width: min(500px, 100%); background: var(--panel); border: 1px solid var(--panel-border); 
      border-radius: 24px; padding: 35px; box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    }
    .title { font-family: 'Space Grotesk', sans-serif; color: var(--blynk); letter-spacing: 0.05em; font-size: 1.4rem; display: flex; align-items: center; gap: 12px; }
    .sub { color: var(--muted); font-size: 0.85rem; margin-top: 8px; margin-bottom: 25px; }
    
    .nav-sync { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 30px; }
    .nav-sync a { 
      text-decoration: none; text-align: center; padding: 12px; border-radius: 12px; border: 1px solid var(--panel-border);
      background: rgba(255,255,255,0.03); color: var(--text); font-size: 0.75rem; font-weight: 700; text-transform: uppercase;
      transition: all 0.3s;
    }
    .nav-sync a:hover { background: var(--field); border-color: var(--muted); }

    .field { display: grid; gap: 8px; margin-bottom: 20px; }
    label { font-size: 0.75rem; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
    input { 
      width: 100%; padding: 14px 16px; border-radius: 12px; border: 1px solid var(--panel-border);
      background: var(--field); color: var(--text); font-size: 0.95rem; transition: border-color 0.3s;
    }
    input:focus { outline: none; border-color: var(--blynk); }

    .btn { 
      width: 100%; padding: 14px; border-radius: 12px; border: none; background: var(--blynk);
      color: #fff; font-size: 0.9rem; font-weight: 800; text-transform: uppercase; cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(34, 197, 94, 0.3); }
    .btn.alt { background: transparent; border: 1px solid var(--panel-border); color: var(--text); margin-top: 10px; display: block; text-decoration: none; text-align: center; }
    
    .info-box { font-size: 0.8rem; color: var(--muted); line-height: 1.5; margin-top: 20px; padding: 15px; border-left: 3px solid var(--blynk); background: rgba(34, 197, 94, 0.05); }
  </style>
</head>
<body>
  <div class="card">
    <div class="title"><i data-lucide="cloud"></i> BLYNK CLOUD</div>
    <div class="sub">Configure your Blynk IoT authentication.</div>
    
    <div class="nav-sync">
      <a href="/dashboard">Dashboard</a>
      <a href="/wificonfig">WiFi Setup</a>
      <a href="/webpassconfig">Security</a>
      <a href="/appassconfig">AP Pass</a>
    </div>

    <form action="/saveblynkconfig" method="POST">
      <div class="field">
        <label for="blynktoken">Auth Token</label>
        <input type="text" name="blynktoken" id="blynktoken" placeholder="Paste your Blynk token here" required>
      </div>
      <button type="submit" class="btn">Save & Sync Cloud</button>
      <a href="/dashboard" class="btn alt">Cancel</a>
    </form>

    <div class="info-box">
      Ensure your device is connected to a WiFi network with internet access for Blynk synchronization to work.
    </div>
  </div>

  <script>lucide.createIcons();</script>
</body>
</html>
