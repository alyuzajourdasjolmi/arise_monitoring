<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARISE IoT | Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root {
      --bg: #030508;
      --panel: #080d18;
      --panel-border: #152040;
      --text: #e8ecf4;
      --muted: #8896b3;
      --brand: #ff525f;
      --field: #0e1525;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Manrope', sans-serif; }
    body { 
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
      background: radial-gradient(circle at 15% 8%, #0a1628 0, var(--bg) 60%); color: var(--text);
    }
    .card { 
      width: min(420px, 100%); background: var(--panel); border: 1px solid var(--panel-border); 
      border-radius: 24px; padding: 35px; box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    }
    .top { text-align: center; margin-bottom: 30px; }
    .login-logo {
      display: flex; align-items: center; justify-content: center; margin-bottom: 12px;
    }
    .login-logo svg { width: 42px; height: 42px; }
    .login-logo-text { font-family: 'Space Grotesk', sans-serif; font-size: 1.4rem; letter-spacing: 0.12em; color: #fff; font-weight: 700; }
    .login-logo-text .dot-i { color: var(--brand); }
    .title { font-family: 'Space Grotesk', sans-serif; font-size: 1rem; letter-spacing: 0.1em; color: var(--muted); text-transform: uppercase; }
    
    .field { display: grid; gap: 8px; margin-bottom: 20px; }
    label { font-size: 0.75rem; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
    input { 
      width: 100%; padding: 14px 16px; border-radius: 12px; border: 1px solid var(--panel-border);
      background: var(--field); color: var(--text); font-size: 0.95rem; transition: border-color 0.3s;
    }
    input:focus { outline: none; border-color: #3b82f6; }

    .btn { 
      width: 100%; padding: 14px; border-radius: 12px; border: none; 
      background: linear-gradient(135deg, #3b82f6, var(--brand));
      color: #fff; font-size: 0.9rem; font-weight: 800; text-transform: uppercase; cursor: pointer;
      transition: transform 0.2s; margin-top: 10px;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(59, 130, 246, 0.3); }
    
    .error-msg { 
      display: none; padding: 12px; background: rgba(239, 68, 68, 0.1); border: 1px solid #ef4444; 
      border-radius: 12px; color: #fca5a5; font-size: 0.8rem; margin-bottom: 20px; text-align: center;
    }
    .footer-links { margin-top: 25px; display: flex; justify-content: center; gap: 20px; font-size: 0.75rem; }
    .footer-links a { color: var(--muted); text-decoration: none; font-weight: 700; }
    .footer-links a:hover { color: #3b82f6; }
  </style>
</head>
<body>
  <div class="card">
    <div class="top">
      <div class="login-logo">
        <img src="/logo.png" alt="ARISE Logo" style="width: 220px; height: auto;">
      </div>
      <div class="title">Command Access</div>
    </div>

    <div id="errMsg" class="error-msg"></div>

    <form onsubmit="return doLogin()">
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Enter username" required>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter password" required>
      </div>
      <button type="submit" class="btn">Authorize</button>
    </form>

    <div class="footer-links">
      <a href="/wificonfig">WiFi Setup</a>
      <a href="/dashboard">Direct Link</a>
    </div>
  </div>

  <script>
    lucide.createIcons();
    function doLogin() {
      const u = document.getElementById("username").value;
      const p = document.getElementById("password").value;
      const err = document.getElementById("errMsg");
      fetch("/logincheck", { 
        method: "POST", 
        headers: { "Content-Type": "application/x-www-form-urlencoded" }, 
        body: "username=" + encodeURIComponent(u) + "&password=" + encodeURIComponent(p) 
      }).then(r => r.text()).then(t => {
        if (t === "OK") { window.location.href = "/dashboard"; } 
        else { err.style.display = "block"; err.textContent = "Invalid username or password."; }
      }).catch(e => { err.style.display = "block"; err.textContent = "Login failed: " + e; });
      return false;
    }
  </script>
</body>
</html>
